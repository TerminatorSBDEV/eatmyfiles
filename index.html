<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzBridge | Global Chat Room</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --panel: #18181b;
            --border: #27272a;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.15);
            --blue: #58a6ff;
            --error: #ff7b72;
            --text: #f4f4f5;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* Telas de Bloqueio / Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; transition: 0.3s;
        }

        .card {
            background: var(--panel); border: 1px solid var(--border); padding: 35px;
            border-radius: 12px; width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        #ban-screen {
            background: #1a0508; border: 2px solid var(--error);
            box-shadow: 0 0 30px rgba(255, 123, 114, 0.2);
        }

        /* Layout do Chat */
        .chat-layout {
            display: flex; flex-direction: column; width: 100vw; height: 100vh;
            max-width: 600px; border-right: 1px solid var(--border); border-left: 1px solid var(--border);
            background: var(--panel);
        }

        .chat-header {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: #09090b;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--error);
        }
        .status-dot.online {
            background: var(--accent); box-shadow: 0 0 8px var(--accent);
        }

        .chat-messages {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Elementos da Mensagem com PFP */
        .msg-container {
            display: flex; gap: 10px; align-items: flex-start; max-width: 85%;
        }
        .msg-container.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-container.other { align-self: flex-start; }

        .pfp-avatar {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
            border: 1px solid var(--border); background: #222;
        }

        .msg-bubble {
            padding: 10px 14px; border-radius: 10px;
            font-size: 0.95rem; line-height: 1.45; word-wrap: break-word;
            border: 1px solid var(--border); background: #16161a;
            position: relative; transition: opacity 0.2s;
        }

        .msg-bubble.pending { opacity: 0.5; } 
        .msg-bubble.sent { opacity: 1; } 

        .msg-container.me .msg-bubble {
            background: #152219; border-color: var(--accent-dim);
            border-top-right-radius: 2px;
        }
        .msg-container.other .msg-bubble {
            border-top-left-radius: 2px;
        }

        .msg-bubble .sender-name {
            font-size: 0.75rem; font-weight: bold; color: var(--blue); margin-bottom: 4px;
        }
        .msg-container.me .sender-name { color: var(--accent); }

        /* Estilo Matrix para o Owner */
        .msg-container.owner-msg .msg-bubble {
            background: #000000 !important;
            color: #00ff66 !important;
            border: 1px solid #00ff66 !important;
            font-family: 'Courier New', Courier, monospace !important;
            text-shadow: 0 0 5px #00ff66;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
        }
        .msg-container.owner-msg .sender-name { color: #00ff66 !important; }

        .system-msg {
            text-align: center; font-size: 0.8rem; color: #71717a;
            margin: 10px 0; font-family: monospace;
        }

        #typing-indicator {
            padding: 5px 20px; font-size: 0.8rem; color: var(--accent);
            font-style: italic; min-height: 20px; background: #09090b;
        }

        .input-bar {
            padding: 15px; border-top: 1px solid var(--border);
            background: #09090b; display: flex; gap: 8px; align-items: center;
        }

        input {
            flex-grow: 1; background: #020204; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none;
            font-size: 0.95rem; font-family: monospace;
        }
        input:focus { border-color: var(--blue); }

        .btn {
            background: var(--accent); color: black; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: #00cc6a; }

        .icon-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text); padding: 10px; border-radius: 8px; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; box-sizing: border-box;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

        .setup-row { display: flex; gap: 10px; margin-top: 5px; }
        .setup-row input { text-align: left; }
    </style>
</head>
<body>

    <!-- Passo 0: Buffering Inicial -->
    <div id="overlay-sync" class="overlay">
        <div class="card" style="border-color: var(--border);">
            <h3 style="margin-bottom: 20px; color: var(--blue);">Synchronizing Secure Connection...</h3>
            <div id="sync-subtext" style="font-size:0.8rem; color:#71717a; font-family: monospace;">Syncing unique UserID with EzBridge.</div>
        </div>
    </div>

    <!-- Tela de Banimento Físico -->
    <div id="overlay-banned" class="overlay" style="display:none;">
        <div class="card" id="ban-screen">
            <h1 style="color: var(--error); text-shadow: 0 0 10px rgba(255, 123, 114, 0.4);">⚠️ YOUR SESSION HAS BEEN BANNED</h1>
            <p style="font-family: monospace; font-size: 0.85rem; color: #a1a1aa; line-height: 1.5; margin: 20px 0;">
                R: Ban enforcement.<br>
                You are permanently disconnected from this global chat room.
            </p>
        </div>
    </div>

    <!-- Modal do Perfil -->
    <div id="modal-profile" class="overlay" style="display:none;">
        <div class="card" style="max-width: 380px;">
            <h3>Update Profile</h3>
            <div class="setup-row" style="flex-direction: column; text-align: left; gap: 10px; margin: 15px 0;">
                <label style="font-size: 0.75rem; color: #888;">YOUR AVATAR (PFP)</label>
                <button class="btn btn-secondary" type="button" onclick="triggerPfpUpload()">[Click to Choose Image]</button>
                <input type="file" id="pfp-input" accept="image/*" style="display:none;" onchange="handlePfpSelect(this)">
                
                <div style="display:flex; justify-content:center; margin: 5px 0;">
                    <img id="profile-preview-pfp" class="pfp-avatar" style="width:60px; height:60px;" src="">
                </div>

                <label style="font-size: 0.75rem; color: #888;">YOUR NAME (MAX 20 CHARS)</label>
                <input type="text" id="profile-name-input" placeholder="Leave blank for your ID" maxlength="20">
            </div>
            <button class="btn btn-blue" onclick="updateProfileSubmit()">[UPDATE PROFILE]</button>
            <button class="btn btn-secondary" onclick="closeProfileModal()">Cancel</button>
        </div>
    </div>

    <!-- Layout do Chat Room -->
    <div class="chat-layout">
        <div class="chat-header">
            <div style="display:flex; flex-direction:column; gap:4px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <div id="status-dot" class="status-dot"></div>
                    <span style="font-weight: bold; font-size: 0.95rem;" id="my-id-display">Connecting...</span>
                </div>
                <div style="font-size:0.75rem; color:#888;">people on this site: <span id="site-users-count" style="color:var(--blue); font-weight:bold;">0</span></div>
            </div>
            <button class="btn" style="padding:6px 12px; font-size:0.75rem; width:auto;" onclick="openProfileModal()">Change Profile</button>
        </div>

        <div id="chat-messages" class="chat-messages">
            <div class="system-msg">[System] Conectado ao chat global em tempo real.</div>
        </div>

        <div id="typing-indicator"></div>

        <div class="input-bar">
            <button class="icon-btn" onclick="triggerVideoUpload()">🎥</button>
            <input type="file" id="video-input" accept="video/*,image/gif" style="display:none;" onchange="handleMediaSelect(this, 'video')">

            <button class="icon-btn" onclick="triggerImageUpload()">📷</button>
            <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="handleImageSend(this)">
            
            <button class="icon-btn" onclick="triggerAudioUpload()">🎶</button>
            <input type="file" id="audio-input" accept="audio/*" style="display:none;" onchange="handleMediaSelect(this, 'audio')">

            <input type="text" id="chat-input" placeholder="Type a message or command..." autocomplete="off" oninput="handleTyping()">
            <button class="btn" onclick="sendMsg()">Send</button>
        </div>
    </div>

<script>
    // --- CREDENCIAIS ---
    const TUNNEL = " https://negotiations-melissa-stack-administration.trycloudflare.com";
    const VIRTUAL_SERVER_KEY = "55c130c22c";
    const OWNER_ID = "da0d3ac30047021752d9";

    let myId = getCookie("eb_owner_id") || "";
    let socket = io(TUNNEL, { auth: { token: "default_key" } });

    let banList = [];
    let chatHistory = [];
    let isConnected = false;
    
    // Perfil do Usuário
    let myProfile = { name: "", avatar: "" };

    // Estados do digitador
    let isTyping = false;
    let typingTimeout = null;
    const activeTypers = new Set();

    // Configurações do Chunked Upload (Vídeo/Áudio)
    const CHUNK_SIZE = 150 * 1024; 
    const pendingFileChunks = {}; 
    const activeUploads = {}; 

    // --- COORDENADORES DO SISTEMA P2P LATENCY SYNC ---
    let potentialSyncHosts = [];
    let pingCheckTimeout = null;

    // Carrega perfil salvo localmente
    const savedProfile = localStorage.getItem('eb_user_profile');
    if (savedProfile) {
        try { myProfile = JSON.parse(savedProfile); } catch(e) {}
    }

    // --- CONEXÃO E IDENTIFICAÇÃO ---
    socket.on('connect', () => {
        socket.emit('eb_sync_session', { ownerId: myId });
    });

    socket.on('session_verified', (data) => {
        myId = data.ownerId;
        setCookie("eb_owner_id", myId, 365);
        
        document.getElementById('my-id-display').innerText = `ID: ${myId.substring(0, 10)}`;
        document.getElementById('status-dot').classList.add('online');

        socket.emit('join_virtual_server', { key: VIRTUAL_SERVER_KEY });
    });

    socket.on('joined_successfully', () => {
        isConnected = true;
        
        // Exibe status visual na tela de sync
        const subtext = document.getElementById('sync-subtext');
        subtext.innerText = "Querying fastest active peer for chat history...";

        // Inicializa o barramento de sincronização por latência P2P
        potentialSyncHosts = [];
        socket.emit('RemoteEvent', {
            type: 'sync_ping_request',
            senderId: myId,
            timestamp: Date.now(),
            room: VIRTUAL_SERVER_KEY
        });

        // Janela de coleta de pings de 600ms para definir o melhor hospedeiro
        pingCheckTimeout = setTimeout(() => {
            document.getElementById('overlay-sync').style.display = 'none';
            
            if (potentialSyncHosts.length > 0) {
                // Ordena os candidatos do menor para o maior ping
                potentialSyncHosts.sort((a, b) => a.latency - b.latency);
                const bestHost = potentialSyncHosts[0].id;
                
                addSystemMessage(`Sincronizando histórico com o peer mais rápido (ID: ${bestHost.substring(0, 5)} - ${potentialSyncHosts[0].latency}ms)...`);
                
                // Solicita o histórico diretamente para ele
                socket.emit('RemoteEvent', {
                    type: 'history_request_direct',
                    targetId: bestHost,
                    senderId: myId,
                    room: VIRTUAL_SERVER_KEY
                });
            } else {
                addSystemMessage("Nenhum peer ativo encontrado para sincronizar histórico. Iniciando chat limpo.");
            }
        }, 6000); // 600ms para celulares e redes rápidas (corrigido digitação para 600ms)

        // Loop de monitoramento de usuários online no site (a cada 5s)
        setInterval(() => {
            if (isConnected) {
                socket.emit('eb_heartbeat', { key: VIRTUAL_SERVER_KEY, ownerId: myId });
            }
        }, 5000);
    });

    socket.on('eb_heartbeat_response', (data) => {
        document.getElementById('site-users-count').innerText = data.users;
    });

    socket.on('join_error', (data) => {
        alert("Erro de conexão: " + data.error);
        location.reload();
    });

    socket.on('connect_error', () => {
        document.getElementById('status-dot').classList.remove('online');
        document.getElementById('my-id-display').innerText = "Offline";
    });

    // --- RECEBIMENTO DE EVENTOS ---
    socket.on('RemoteEvent', (packet) => {
        if (!isConnected) return;

        // Tratar o pulso de teste de latência (Ping) de novos conexões
        if (packet.type === 'sync_ping_request') {
            // Se eu tenho histórico ativo de mensagens, me voluntario respondendo o ping
            if (chatHistory.length > 0) {
                socket.emit('RemoteEvent', {
                    type: 'sync_ping_response',
                    targetId: packet.senderId,
                    senderId: myId,
                    timestamp: packet.timestamp,
                    room: VIRTUAL_SERVER_KEY
                });
            }
        }

        // Receber a resposta de ping e medir latência
        if (packet.type === 'sync_ping_response' && packet.targetId === myId) {
            const latency = Date.now() - packet.timestamp;
            potentialSyncHosts.push({ id: packet.senderId, latency: latency });
        }

        // Se eu fui escolhido como o peer mais rápido, envio meu histórico para o novato
        if (packet.type === 'history_request_direct' && packet.targetId === myId) {
            socket.emit('RemoteEvent', {
                type: 'history_payload_direct',
                targetId: packet.senderId,
                history: chatHistory,
                banList: banList,
                room: VIRTUAL_SERVER_KEY
            });
        }

        // Se eu sou o novato e recebi os dados do peer mais rápido, carrego-os na tela
        if (packet.type === 'history_payload_direct' && packet.targetId === myId) {
            chatHistory = packet.history || [];
            banList = packet.banList || [];
            checkMyBanStatus();
            renderChatHistory();
            addSystemMessage("Sincronização concluída com sucesso!");
        }

        // Receber Mensagem Convencional ou de Imagem Leve (Ouvir)
        if (packet.type === 'chat_msg') {
            chatHistory.push({ userId: packet.userId, text: packet.text, image: packet.image, profile: packet.profile });
            limitHistoryAndDOM();
            appendMessage(packet.userId, packet.text, packet.userId === myId, packet.image, null, null, packet.profile);
        }

        // Receber Pedaços de Arquivos Grandes (Vídeo/Áudio) e Reconstruir
        if (packet.type === 'chat_media_chunk') {
            handleIncomingMediaChunk(packet);
        }

        // Atualização de Digitador
        if (packet.type === 'typing_status') {
            if (packet.isTyping) {
                activeTypers.add(packet.userId);
            } else {
                activeTypers.delete(packet.userId);
            }
            updateTypingDisplay();
        }

        if (packet.type === 'ban_broadcast') {
            if (!banList.includes(packet.targetId)) banList.push(packet.targetId);
            checkMyBanStatus();
        }

        if (packet.type === 'unban_broadcast') {
            banList = banList.filter(id => id !== packet.targetId);
        }

        if (packet.type === 'clear_broadcast') {
            chatHistory = [];
            document.getElementById('chat-messages').innerHTML = `<div class="system-msg">[System] O histórico do chat foi limpo pelo moderador.</div>`;
        }
    });

    // Limita as mensagens na fila lógica e limpa o DOM para manter o limite estrito de 50 mensagens
    function limitHistoryAndDOM() {
        if (chatHistory.length > 50) chatHistory.shift();
        
        const container = document.getElementById('chat-messages');
        while (container.children.length > 50) {
            container.removeChild(container.firstChild);
        }
    }

    // --- LOGICA DE DIGITAÇÃO ---
    function handleTyping() {
        if (!isTyping) {
            isTyping = true;
            socket.emit('RemoteEvent', { type: 'typing_status', userId: myId, isTyping: true });
        }
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
            socket.emit('RemoteEvent', { type: 'typing_status', userId: myId, isTyping: false });
        }, 3000);
    }

    function updateTypingDisplay() {
        const indicator = document.getElementById('typing-indicator');
        const typersArray = Array.from(activeTypers).filter(id => id !== myId);
        
        if (typersArray.length > 0) {
            indicator.innerText = typersArray.map(id => `ID: ${id.substring(0, 10)} is typing...`).join(', ');
        } else {
            indicator.innerText = "";
        }
    }

    // --- CONFIGURAÇÃO E UPDATE DO PERFIL ---
    function openProfileModal() {
        document.getElementById('modal-profile').style.display = 'flex';
        document.getElementById('profile-name-input').value = myProfile.name;
        document.getElementById('profile-preview-pfp').src = myProfile.avatar || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'></circle><path d='M8 14s1.5 2 4 2 4-2 4-2'></path><line x1='9' y1='9' x2='9.01' y2='9'></line><line x1='15' y1='9' x2='15.01' y2='9'></line></svg>";
    }
    function closeProfileModal() { document.getElementById('modal-profile').style.display = 'none'; }
    function triggerPfpUpload() { document.getElementById('pfp-input').click(); }
    
    function handlePfpSelect(input) {
        if (input.files.length === 0) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            myProfile.avatar = e.target.result;
            document.getElementById('profile-preview-pfp').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateProfileSubmit() {
        myProfile.name = document.getElementById('profile-name-input').value.trim().substring(0, 20);
        localStorage.setItem('eb_user_profile', JSON.stringify(myProfile));
        closeProfileModal();
        addSystemMessage("Seu perfil foi atualizado com sucesso localmente.");
    }

    // --- PROCESSAMENTO E ENVIO EM CHUNKS (ÁUDIO / VÍDEO) ---
    function triggerVideoUpload() { document.getElementById('video-input').click(); }
    function triggerAudioUpload() { document.getElementById('audio-input').click(); }

    function handleMediaSelect(input, type) {
        if (input.files.length === 0) return;
        const file = input.files[0];

        if (file.size > 10 * 1024 * 1024) {
            alert("Media files must be under 10MB!");
            input.value = "";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            const fileId = "media_" + Date.now();
            
            // Cria bolha de mensagem local com 50% de opacidade (Pendente)
            const tempBubble = appendMessage(myId, `Uploading ${type}... 0%`, true, null, null, type, myProfile);
            tempBubble.classList.add('pending'); 
            activeUploads[fileId] = tempBubble;

            sendMediaChunks(base64Data, fileId, type);
            input.value = "";
        };
        reader.readAsDataURL(file);
    }

    function sendMediaChunks(fullBase64, fileId, type) {
        const total = Math.ceil(fullBase64.length / CHUNK_SIZE);
        let index = 0;

        function next() {
            if (index < total) {
                const start = index * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, fullBase64.length);
                const chunk = fullBase64.slice(start, end);

                socket.emit('RemoteEvent', {
                    type: 'chat_media_chunk',
                    room: VIRTUAL_SERVER_KEY,
                    fileId: fileId,
                    index: index,
                    total: total,
                    data: chunk,
                    mediaType: type,
                    userId: myId,
                    profile: myProfile
                });

                const pct = Math.floor((index / total) * 100);
                if (activeUploads[fileId]) {
                    activeUploads[fileId].querySelector('.media-content-text').innerText = `Uploading ${type}... ${pct}%`;
                }

                index++;
                setTimeout(next, 75); 
            } else {
                const bubble = activeUploads[fileId];
                if (bubble) {
                    bubble.classList.remove('pending');
                    bubble.classList.add('sent'); 
                    
                    const container = bubble.querySelector('.media-content-text');
                    container.innerHTML = "";
                    if (type === 'video') {
                        container.innerHTML = `<video src="${fullBase64}" controls style="max-width:100%; max-height:240px; border-radius:8px; display:block;"></video>`;
                    } else {
                        container.innerHTML = `<audio src="${fullBase64}" controls style="max-width:100%; display:block;"></audio>`;
                    }
                }
                
                // Grava na fila lógica de histórico local de 50 mensagens
                chatHistory.push({ userId: myId, text: "", image: null, mediaBase64: fullBase64, mediaType: type, profile: myProfile });
                limitHistoryAndDOM();

                delete activeUploads[fileId];
            }
        }
        next();
    }

    function handleIncomingMediaChunk(packet) {
        const { fileId, index, total, data, mediaType, userId, profile } = packet;

        if (!pendingFileChunks[fileId]) {
            pendingFileChunks[fileId] = Array(total).fill(null);
        }

        pendingFileChunks[fileId][index] = data;

        if (pendingFileChunks[fileId].every(c => c !== null)) {
            const assembledBase64 = pendingFileChunks[fileId].join('');
            delete pendingFileChunks[fileId];

            chatHistory.push({ userId, text: "", image: null, mediaBase64: assembledBase64, mediaType, profile });
            limitHistoryAndDOM();

            appendMessage(userId, "", userId === myId, null, assembledBase64, mediaType, profile);
        }
    }

    // --- ENVIAR FOTOS LEVES ---
    function triggerImageUpload() { document.getElementById('image-input').click(); }
    
    function handleImageSend(input) {
        if (input.files.length === 0) return;
        const file = input.files[0];

        if (file.size > 2 * 1024 * 1024) {
            alert("Images sent via camera button must be under 2MB! Use video/gif button for larger ones.");
            input.value = "";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Img = e.target.result;
            
            const tempBubble = appendMessage(myId, "", true, base64Img, null, null, myProfile);
            tempBubble.classList.add('pending');

            socket.emit('RemoteEvent', {
                type: 'chat_msg',
                userId: myId,
                text: "",
                image: base64Img,
                profile: myProfile
            }, () => {
                tempBubble.classList.remove('pending');
                tempBubble.classList.add('sent');
            });

            chatHistory.push({ userId: myId, text: "", image: base64Img, profile: myProfile });
            limitHistoryAndDOM();

            input.value = "";
        };
        reader.readAsDataURL(file);
    }

    // --- ENVIAR TEXTO ---
    function sendMsg() {
        const input = document.getElementById('chat-input');
        let text = input.value.trim();
        if (!text) return;

        isTyping = false;
        clearTimeout(typingTimeout);
        socket.emit('RemoteEvent', { type: 'typing_status', userId: myId, isTyping: false });

        if (myId === OWNER_ID && text.startsWith('/')) {
            handleOwnerCommand(text);
            input.value = "";
            return;
        }

        if (banList.includes(myId)) {
            checkMyBanStatus();
            return;
        }

        const tempBubble = appendMessage(myId, text, true, null, null, null, myProfile);
        tempBubble.classList.add('pending');

        socket.emit('RemoteEvent', {
            type: 'chat_msg',
            userId: myId,
            text: text,
            profile: myProfile
        }, () => {
            tempBubble.classList.remove('pending');
            tempBubble.classList.add('sent');
        });

        chatHistory.push({ userId: myId, text: text, profile: myProfile });
        limitHistoryAndDOM();

        input.value = "";
    }

    // --- INTERPRETADOR DE COMANDOS ---
    function handleOwnerCommand(cmdStr) {
        const parts = cmdStr.split(' ');
        const cmd = parts[0].toLowerCase();
        const arg = parts[1] ? parts[1].trim() : "";

        if (cmd === '/ban' && arg) {
            const resolvedId = resolvePartialUserId(arg);
            if (!resolvedId) return alert("Nenhum usuário correspondente.");
            if (resolvedId === OWNER_ID) return alert("Você não pode se banir!");

            if (!banList.includes(resolvedId)) {
                banList.push(resolvedId);
                socket.emit('RemoteEvent', { type: 'ban_broadcast', targetId: resolvedId });
                socket.emit('RemoteEvent', { type: 'ebdata_add_bans', data: banList });
                addSystemMessage(`Jogador ${resolvedId} foi banido.`);
            }
        }
        else if (cmd === '/unban' && arg) {
            const resolvedId = resolvePartialUserIdFromBans(arg);
            if (resolvedId) {
                banList = banList.filter(id => id !== resolvedId);
                socket.emit('RemoteEvent', { type: 'unban_broadcast', targetId: resolvedId });
                socket.emit('RemoteEvent', { type: 'ebdata_add_bans', data: banList });
                addSystemMessage(`Jogador ${resolvedId} foi desbanido.`);
            }
        }
        else if (cmd === "/clear") {
            chatHistory = [];
            document.getElementById('chat-messages').innerHTML = `<div class="system-msg">[System] O histórico foi limpo pelo moderador.</div>`;
            socket.emit('RemoteEvent', { type: 'clear_broadcast' });
        }
    }

    function resolvePartialUserId(partial) {
        const clean = partial.toLowerCase();
        for (let msg of chatHistory) {
            if (msg.userId.toLowerCase().includes(clean)) return msg.userId;
        }
        return partial.length >= 10 ? partial : null;
    }

    function resolvePartialUserIdFromBans(partial) {
        const clean = partial.toLowerCase();
        for (let id of banList) {
            if (id.toLowerCase().includes(clean)) return id;
        }
        return partial;
    }

    // --- RENDERIZADOR VISUAL ---
    function appendMessage(userId, text, isMe, imageBase64, mediaBase64, mediaType, profile) {
        const container = document.getElementById('chat-messages');
        
        const msgContainer = document.createElement('div');
        msgContainer.className = `msg-container ${isMe ? 'me' : 'other'}`;
        
        if (userId === OWNER_ID) {
            msgContainer.classList.add('owner-msg');
        }

        const avatarSrc = (profile && profile.avatar) ? profile.avatar : "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'></circle><path d='M8 14s1.5 2 4 2 4-2 4-2'></path><line x1='9' y1='9' x2='9.01' y2='9'></line><line x1='15' y1='9' x2='15.01' y2='9'></line></svg>";
        const senderDisplayName = (profile && profile.name) ? profile.name : `ID: ${userId.substring(0, 10)}`;

        const pfpImg = document.createElement('img');
        pfpImg.className = 'pfp-avatar';
        pfpImg.src = avatarSrc;

        const bubble = document.createElement('div');
        bubble.className = `msg-bubble`;
        
        let contentHtml = `
            <div class="sender-name">${userId === OWNER_ID ? 'Moderador / Owner' : senderDisplayName}</div>
            <div class="media-content-text">${text ? `<div>${text}</div>` : ''}</div>
        `;

        if (imageBase64) {
            contentHtml += `<img src="${imageBase64}" style="max-width:100%; max-height:220px; border-radius:8px; margin-top:6px; display:block; object-fit:cover;">`;
        }

        if (mediaBase64) {
            if (mediaType === 'video') {
                contentHtml += `<video src="${mediaBase64}" controls style="max-width:100%; max-height:240px; border-radius:8px; display:block; margin-top:6px;"></video>`;
            } else if (mediaType === 'audio') {
                contentHtml += `<audio src="${mediaBase64}" controls style="max-width:100%; display:block; margin-top:6px;"></audio>`;
            }
        }

        bubble.innerHTML = contentHtml;
        msgContainer.appendChild(pfpImg);
        msgContainer.appendChild(bubble);
        container.appendChild(msgContainer);
        container.scrollTop = container.scrollHeight;

        return bubble; 
    }

    function finalizeLocalPendingMessage(fileId) {
        const bubble = activeUploads[fileId];
        if (bubble) {
            bubble.classList.remove('pending');
            bubble.classList.add('sent');
        }
    }

    function renderChatHistory() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = "";
        chatHistory.forEach(msg => {
            appendMessage(msg.userId, msg.text, msg.userId === myId, msg.image, msg.mediaBase64, msg.mediaType, msg.profile);
        });
        limitHistoryAndDOM();
    }

    function addSystemMessage(text) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.innerText = `[System] ${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        limitHistoryAndDOM();
    }

    function checkMyBanStatus() {
        if (banList.includes(myId)) {
            document.getElementById('overlay-banned').style.display = 'flex';
            socket.disconnect();
        }
    }

    function copyMyId() {
        if (!myId) return;
        navigator.clipboard.writeText(myId);
        alert(`ID copiado: ${myId}`);
    }

    // --- COOKIE HELPERS ---
    function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + (days*24*60*60*1000));
        let expires = "expires="+ d.toUTCString();
        document.cookie = name + "=" + value + ";" + expires + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0;i < ca.length;i++) {
            let c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsg();
    });
</script>
