<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzBridge | Global Chat Room</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --panel: #18181b;
            --border: #27272a;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.15);
            --blue: #58a6ff;
            --error: #ff7b72;
            --text: #f4f4f5;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
        }

        /* Telas de Bloqueio / Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; transition: 0.3s;
        }

        .card {
            background: var(--panel); border: 1px solid var(--border); padding: 35px;
            border-radius: 12px; width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        /* Ban Screen */
        #ban-screen {
            background: #1a0508; border: 2px solid var(--error);
            box-shadow: 0 0 30px rgba(255, 123, 114, 0.2);
        }

        /* Layout Do Chat */
        .chat-layout {
            display: flex; flex-direction: column; width: 100vw; height: 100vh;
            max-width: 600px; border-right: 1px solid var(--border); border-left: 1px solid var(--border);
            background: var(--panel);
        }

        .chat-header {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: #111113;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--error);
        }
        .status-dot.online {
            background: var(--accent); box-shadow: 0 0 8px var(--accent);
        }

        .chat-messages {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg-bubble {
            max-width: 85%; padding: 10px 14px; border-radius: 10px;
            font-size: 0.95rem; line-height: 1.45; word-wrap: break-word;
            border: 1px solid var(--border);
        }

        .msg-bubble.me {
            align-self: flex-end; background: #1c2e22; border-color: var(--accent-dim);
            border-bottom-right-radius: 2px;
        }

        .msg-bubble.other {
            align-self: flex-start; background: #18181b;
            border-bottom-left-radius: 2px;
        }

        .msg-bubble .sender-id {
            font-size: 0.7rem; font-family: monospace; font-weight: bold;
            color: var(--blue); margin-bottom: 4px;
        }

        .msg-bubble.me .sender-id { color: var(--accent); }

        .system-msg {
            text-align: center; font-size: 0.8rem; color: #71717a;
            margin: 10px 0; font-family: monospace;
        }

        .input-bar {
            padding: 15px; border-top: 1px solid var(--border);
            background: #111113; display: flex; gap: 10px;
        }

        input {
            flex-grow: 1; background: #09090b; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none;
            font-size: 0.95rem; font-family: monospace;
        }
        input:focus { border-color: var(--blue); }

        .btn {
            background: var(--accent); color: black; border: none; padding: 0 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: #00cc6a; }
    </style>
</head>
<body>

    <!-- Passo 0: Buffering Inicial -->
    <div id="overlay-sync" class="overlay">
        <div class="card" style="border-color: var(--border);">
            <h3 style="margin-bottom: 20px; color: var(--blue);">Synchronizing Secure Connection...</h3>
            <div style="font-size:0.8rem; color:#71717a; font-family: monospace;">Syncing unique UserID with EzBridge.</div>
        </div>
    </div>

    <!-- Tela de Banimento Físico -->
    <div id="overlay-banned" class="overlay" style="display:none;">
        <div class="card" id="ban-screen">
            <h1 style="color: var(--error); text-shadow: 0 0 10px rgba(255, 123, 114, 0.4);">⚠️ YOUR SESSION HAS BEEN BANNED</h1>
            <p style="font-family: monospace; font-size: 0.85rem; color: #a1a1aa; line-height: 1.5; margin: 20px 0;">
                R: Ban enforcement.<br>
                You are permanently disconnected from this global chat room.
            </p>
        </div>
    </div>

    <!-- Layout do Chat Room -->
    <div class="chat-layout">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="status-dot" class="status-dot"></div>
                <span style="font-weight: bold; font-size: 0.95rem;" id="my-id-display">Connecting...</span>
            </div>
            <button class="btn" style="padding:6px 12px; font-size:0.75rem;" onclick="copyMyId()">Copy ID</button>
        </div>

        <div id="chat-messages" class="chat-messages">
            <div class="system-msg">[System] Conectado ao chat global. Carregando histórico...</div>
        </div>

        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Type a message or command..." autocomplete="off">
            <button class="btn" onclick="sendMsg()">Send</button>
        </div>
    </div>

<script>
    // --- CREDENCIAIS ---
    const TUNNEL = "https://card-green-operational-dev.trycloudflare.com";
    const VIRTUAL_SERVER_KEY = "13c25d9dae";
    const OWNER_ID = "da0d3ac30047021752d9";

    let myId = getCookie("eb_owner_id") || "";
    let socket = io(TUNNEL, { auth: { token: "default_key" }, transports: ['websocket'] });

    let banList = [];
    let chatHistory = [];
    let isConnected = false;
    let ProcessandoIA = false; // Evitar loops de renderização

    // --- CONEXÃO E IDENTIFICAÇÃO ---
    socket.on('connect', () => {
        socket.emit('eb_sync_session', { ownerId: myId });
    });

    socket.on('session_verified', (data) => {
        myId = data.ownerId;
        setCookie("eb_owner_id", myId, 365);
        
        document.getElementById('my-id-display').innerText = `ID: ${myId.substring(0, 10)}`;
        document.getElementById('status-dot').classList.add('online');
        document.getElementById('overlay-sync').style.display = 'none';

        // Entrar na sala do Servidor Virtual
        socket.emit('join_virtual_server', { key: VIRTUAL_SERVER_KEY });
    });

    socket.on('joined_successfully', () => {
        isConnected = true;
        
        // Se eu for o dono, carrego o histórico e a lista de banimentos direto do meu EBstorage persistente
        if (myId === OWNER_ID) {
            socket.emit('RemoteEvent', { type: 'ebdata_fetch_global_bans' });
            socket.emit('RemoteEvent', { type: 'ebdata_fetch_global_history' });
        } else {
            // Se eu for espectador, peço os dados de histórico para quem estiver online na sala
            socket.emit('RemoteEvent', { type: 'sync_request', senderId: myId });
        }
    });

    socket.on('join_error', (data) => {
        alert("Erro de conexão: " + data.error);
        location.reload();
    });

    socket.on('connect_error', () => {
        document.getElementById('status-dot').classList.remove('online');
        document.getElementById('my-id-display').innerText = "Offline";
    });

    // --- RECEBIMENTO DE EVENTOS E BANCO ---
    socket.on('RemoteEvent', (packet) => {
        if (!isConnected) return;

        // Tratar recebimento das respostas do banco de dados (EBstorage) do Dono
        if (packet.type === 'storage_response') {
            const res = packet.result;
            if (res && res.success === undefined) {
                // É um retorno de fetch
                if (res.data) {
                    if (packet.cmd_type === 'ebdata_fetch_global_bans') {
                        banList = res.data;
                        checkMyBanStatus();
                    }
                    if (packet.cmd_type === 'ebdata_fetch_global_history') {
                        chatHistory = res.data;
                        renderChatHistory();
                    }
                }
            }
        }

        // P2P: Sincronização de novos usuários que entraram
        if (packet.type === 'sync_request') {
            // Se eu tenho dados (Dono ou participante ativo), respondo enviando o histórico
            if (chatHistory.length > 0 || banList.length > 0) {
                socket.emit('RemoteEvent', {
                    type: 'sync_response',
                    targetId: packet.senderId,
                    banList: banList,
                    chatHistory: chatHistory
                });
            }
        }

        if (packet.type === 'sync_response' && packet.targetId === myId) {
            banList = packet.banList || [];
            chatHistory = packet.chatHistory || [];
            checkMyBanStatus();
            renderChatHistory();
        }

        // Tratar novas mensagens enviadas em tempo real
        if (packet.type === 'chat_msg') {
            chatHistory.push({ userId: packet.userId, text: packet.text });
            appendMessage(packet.userId, packet.text, packet.userId === myId);
        }

        // Tratar banimento transmitido em tempo real
        if (packet.type === 'ban_broadcast') {
            if (!banList.includes(packet.targetId)) banList.push(packet.targetId);
            checkMyBanStatus();
        }

        // Tratar desbanimento transmitido em tempo real
        if (packet.type === 'unban_broadcast') {
            banList = banList.filter(id => id !== packet.targetId);
        }

        // Tratar limpeza de chat em tempo real
        if (packet.type === 'clear_broadcast') {
            chatHistory = [];
            document.getElementById('chat-messages').innerHTML = `<div class="system-msg">[System] O histórico do chat foi limpo pelo moderador.</div>`;
        }
    });

    // --- ENVIAR MENSAGEM / COMANDOS ---
    function sendMsg() {
        const input = document.getElementById('chat-input');
        let text = input.value.trim();
        if (!text) return;

        // Se eu for o dono, intercepto comandos locais primeiro
        if (myId === OWNER_ID && text.startsWith('/')) {
            handleOwnerCommand(text);
            input.value = "";
            return;
        }

        // Se eu estiver banido localmente, impede o envio
        if (banList.includes(myId)) {
            checkMyBanStatus();
            return;
        }

        // Envia mensagem convencional de chat
        socket.emit('RemoteEvent', {
            type: 'chat_msg',
            userId: myId,
            text: text
        });

        // Adiciona localmente e salva no histórico do dono se ele estiver ativo
        chatHistory.push({ userId: myId, text: text });
        appendMessage(myId, text, true);
        
        if (myId === OWNER_ID) {
            saveHistoryToDatabase();
        }

        input.value = "";
    }

    // --- INTERPRETADOR DE COMANDOS DO DONO ---
    function handleOwnerCommand(cmdStr) {
        const parts = cmdStr.split(' ');
        const cmd = parts[0].toLowerCase();
        const arg = parts[1] ? parts[1].trim() : "";

        if (cmd === '/ban' && arg) {
            // Busca correspondência parcial para banimento rápido
            const resolvedId = resolvePartialUserId(arg);
            if (!resolvedId) {
                alert("Nenhum usuário correspondente encontrado no histórico.");
                return;
            }

            if (resolvedId === OWNER_ID) {
                alert("Você não pode banir a si mesmo!");
                return;
            }

            if (!banList.includes(resolvedId)) {
                banList.push(resolvedId);
                // Transmite o banimento para toda a rede
                socket.emit('RemoteEvent', { type: 'ban_broadcast', targetId: resolvedId });
                // Salva permanentemente no EBstorage físico do Dono
                socket.emit('RemoteEvent', { type: 'ebdata_add_blacklist', data: banListToStorageObject() });
                addSystemMessage(`Jogador ${resolvedId} foi banido do servidor.`);
            }
        } 
        
        else if (cmd === '/unban' && arg) {
            const resolvedId = resolvePartialUserIdFromBans(arg);
            if (resolvedId) {
                banList = banList.filter(id => id !== resolvedId);
                socket.emit('RemoteEvent', { type: 'unban_broadcast', targetId: resolvedId });
                socket.emit('RemoteEvent', { type: 'ebdata_add_blacklist', data: banListToStorageObject() });
                addSystemMessage(`Jogador ${resolvedId} foi desbanido.`);
            }
        } 
        
        else if (cmd === '/clear') {
            chatHistory = [];
            socket.emit('RemoteEvent', { type: 'clear_broadcast' });
            socket.emit('RemoteEvent', { type: 'ebdata_clear' }); // Limpa o banco físico
            document.getElementById('chat-messages').innerHTML = `<div class="system-msg">[System] O histórico do chat foi limpo pelo moderador.</div>`;
        }
    }

    // --- FUNÇÕES DE AUXÍLIO ---
    function resolvePartialUserId(partial) {
        const clean = partial.toLowerCase();
        // Varre o histórico em busca de IDs que comecem ou contenham o termo digitado
        for (let msg of chatHistory) {
            if (msg.userId.toLowerCase().includes(clean)) {
                return msg.userId;
            }
        }
        return partial.length >= 10 ? partial : null;
    }

    function resolvePartialUserIdFromBans(partial) {
        const clean = partial.toLowerCase();
        for (let id of banList) {
            if (id.toLowerCase().includes(clean)) return id;
        }
        return partial;
    }

    function checkMyBanStatus() {
        if (banList.includes(myId)) {
            document.getElementById('overlay-banned').style.display = 'flex';
            socket.disconnect();
            isConnected = false;
        }
    }

    function banListToStorageObject() {
        // Converte a lista de banidos para persistência
        const obj = {};
        banList.forEach(id => obj[id] = true);
        return obj;
    }

    function saveHistoryToDatabase() {
        // Mantém apenas as últimas 50 mensagens para poupar espaço em disco do servidor
        if (chatHistory.length > 50) chatHistory.shift();
        socket.emit('RemoteEvent', { type: 'ebdata_add_history', data: chatHistory });
    }

    function renderChatHistory() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = "";
        chatHistory.forEach(msg => {
            appendMessage(msg.userId, msg.text, msg.userId === myId);
        });
    }

    function appendMessage(userId, text, isMe) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMe ? 'me' : 'other'}`;
        div.innerHTML = `
            <div class="sender-id">${userId === OWNER_ID ? 'Moderador / Owner' : 'ID: ' + userId.substring(0, 10)}</div>
            <div>${text}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(text) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.innerText = `[System] ${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function copyMyId() {
        if (!myId) return;
        navigator.clipboard.writeText(myId);
        alert(`ID copiado: ${myId}`);
    }

    // --- COOKIE HELPERS ---
    function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + (days*24*60*60*1000));
        let expires = "expires="+ d.toUTCString();
        document.cookie = name + "=" + value + ";" + expires + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0;i < ca.length;i++) {
            let c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsg();
    });
</script>
</body>
</html>
